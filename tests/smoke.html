<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twistris Smoke Tests</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #0a1620;
        color: #eef7ff;
        font: 14px/1.5 "Segoe UI", Helvetica, Arial, sans-serif;
      }

      h1 {
        margin: 0 0 16px;
        font-size: 22px;
      }

      .result {
        padding: 10px 12px;
        margin: 0 0 10px;
        border-radius: 10px;
        border: 1px solid rgba(120, 163, 196, 0.18);
        background: rgba(255, 255, 255, 0.03);
      }

      .pass {
        border-color: rgba(103, 214, 157, 0.32);
        color: #b8ffd7;
      }

      .fail {
        border-color: rgba(255, 115, 115, 0.42);
        color: #ffd0d0;
      }

      .summary {
        margin-top: 18px;
        font-weight: 700;
      }

      #game,
      #startScreen,
      #startButton,
      #statusValue,
      #currencyValue,
      #gameKeySink {
        position: absolute;
        left: -9999px;
        top: 0;
      }
    </style>
    <script>
      window.requestAnimationFrame = () => 0;
      window.cancelAnimationFrame = () => {};
    </script>
  </head>
  <body>
    <h1>Twistris Smoke Tests</h1>
    <div id="results"></div>

    <div id="startScreen"></div>
    <button id="startButton" type="button">Start</button>
    <div id="statusValue"></div>
    <div id="currencyValue"></div>
    <input id="gameKeySink" type="password" />
    <canvas id="game" width="800" height="800"></canvas>

    <script src="../game.js"></script>
    <script>
      const resultsNode = document.getElementById("results");
      const api = window.__TWISTRIS_TEST_API__;
      let passes = 0;
      let failures = 0;

      function logResult(ok, label, detail = "") {
        const node = document.createElement("div");
        node.className = `result ${ok ? "pass" : "fail"}`;
        node.textContent = ok ? `PASS: ${label}` : `FAIL: ${label}${detail ? ` - ${detail}` : ""}`;
        resultsNode.appendChild(node);
        if (ok) {
          passes += 1;
        } else {
          failures += 1;
        }
      }

      function assert(condition, label, detail = "") {
        logResult(Boolean(condition), label, detail);
      }

      function createBoard() {
        return Array.from({ length: api.GRID_SIZE }, () => Array(api.GRID_SIZE).fill(null));
      }

      function closeEnough(a, b, epsilon = 0.0001) {
        return Math.abs(a - b) <= epsilon;
      }

      function fillCenteredSquare(gameInstance, radius) {
        for (let y = api.CENTER - radius; y <= api.CENTER + radius; y += 1) {
          for (let x = api.CENTER - radius; x <= api.CENTER + radius; x += 1) {
            gameInstance.run.board[y][x] = {
              color: "cyan",
              seed: x === api.CENTER && y === api.CENTER,
              age: 0,
            };
          }
        }
      }

      function setCurrentPiece(gameInstance, shape, x, y) {
        gameInstance.run.current = {
          shape,
          color: shape.color,
          cells: shape.cells.map((cell) => ({ ...cell })),
          x,
          y,
        };
      }

      function completeHarvest(gameInstance, maxSteps = 20) {
        for (let step = 0; step < maxSteps && gameInstance.presentation.harvestSequence; step += 1) {
          gameInstance.updateHarvestSequence(2);
        }
        return gameInstance.presentation.harvestSequence === null;
      }

      try {
        assert(Boolean(api), "test API exposed");

        assert(
          closeEnough(api.nearestQuarterTurn(Math.PI / 3), Math.PI / 2),
          "nearestQuarterTurn rounds to closest quarter turn"
        );

        assert(
          closeEnough(api.averageCenterDistance([{ x: api.CENTER, y: api.CENTER }]), 0),
          "averageCenterDistance is zero at exact center"
        );

        const balancedBoard = createBoard();
        balancedBoard[api.CENTER][api.CENTER - 1] = { color: "cyan" };
        balancedBoard[api.CENTER][api.CENTER + 1] = { color: "cyan" };
        const balancedProfile = api.analyzeBalanceProfile(balancedBoard, 0);
        assert(
          closeEnough(balancedProfile.weightedOffset, 0),
          "analyzeBalanceProfile stays neutral for symmetric mass"
        );

        const rightHeavyBoard = createBoard();
        rightHeavyBoard[api.CENTER][api.CENTER + 1] = { color: "cyan" };
        rightHeavyBoard[api.CENTER][api.CENTER + 2] = { color: "cyan" };
        const rightHeavyProfile = api.analyzeBalanceProfile(rightHeavyBoard, 0);
        assert(
          rightHeavyProfile.weightedOffset > 0,
          "analyzeBalanceProfile trends positive for right-heavy mass"
        );

        const gameInstance = new api.BalanceStackGame();
        assert(
          Boolean(gameInstance.session && gameInstance.run && gameInstance.lifecycle && gameInstance.presentation),
          "runtime exposes separate session, run, lifecycle, and presentation state"
        );
        assert(
          gameInstance.lifecycle.phase === api.GAME_PHASES.TITLE,
          "new game begins in the title phase"
        );
        assert(
          Boolean(gameInstance.run.board[api.CENTER][api.CENTER] && gameInstance.run.board[api.CENTER][api.CENTER].seed),
          "new game seeds the center block"
        );

        assert(
          gameInstance.attachesToStructure([{ x: api.CENTER + 1, y: api.CENTER }]),
          "adjacent landed cell attaches to seeded center"
        );

        assert(
          !gameInstance.attachesToStructure([{ x: api.CENTER + 4, y: api.CENTER + 4 }]),
          "detached landed cell does not attach"
        );

        const randomValues = [0, 0.999];
        let randomIndex = 0;
        const deterministicGame = new api.BalanceStackGame({
          random: () => randomValues[randomIndex++ % randomValues.length],
        });
        assert(deterministicGame.run.nextShape === api.SHAPES[0], "injected random source selects a repeatable next shape");
        deterministicGame.spawnPiece();
        assert(
          deterministicGame.run.current.shape === api.SHAPES[0] && deterministicGame.run.nextShape === api.SHAPES[6],
          "deterministic piece sequence advances predictably"
        );

        const lockGame = new api.BalanceStackGame({ random: () => 0 });
        const squareShape = api.SHAPES.find((shape) => shape.name === "O");
        setCurrentPiece(lockGame, squareShape, api.CENTER - 1, api.CENTER + 1);
        const lockedCells = lockGame.worldCells(lockGame.run.current);
        lockGame.lockPiece();
        assert(lockGame.run.piecesPlaced === 1, "attached piece increments the placed-piece count");
        assert(
          lockedCells.every((cell) => lockGame.run.board[cell.y][cell.x]?.placementId === 1),
          "successful lock writes every landed cell to the board"
        );
        assert(lockGame.run.current?.shape === api.SHAPES[0], "successful lock spawns the deterministic next piece");

        const retryGame = new api.BalanceStackGame({ random: () => 0 });
        setCurrentPiece(retryGame, squareShape, 0, 0);
        retryGame.lockPiece();
        assert(retryGame.run.piecesPlaced === 0, "detached piece does not increment the placed-piece count");
        assert(retryGame.run.current?.shape === squareShape, "detached piece retries with the same shape");
        assert(
          retryGame.run.board.flat().filter(Boolean).length === 1,
          "detached retry leaves the settled board unchanged"
        );

        const clockwiseGame = new api.BalanceStackGame({ random: () => 0 });
        clockwiseGame.run.board[api.CENTER][api.CENTER + 2] = { color: "magenta", seed: false, age: 0 };
        clockwiseGame.rotateStructure(1);
        assert(
          clockwiseGame.run.pendingBoard[api.CENTER + 2][api.CENTER]?.color === "magenta",
          "clockwise rotation stages a right-side cell below the center"
        );
        clockwiseGame.updateRotationAnimation(1);
        assert(
          clockwiseGame.run.board[api.CENTER + 2][api.CENTER]?.color === "magenta" && clockwiseGame.run.orientationTurns === 1,
          "clockwise rotation commits after its animation"
        );

        const counterclockwiseGame = new api.BalanceStackGame({ random: () => 0 });
        counterclockwiseGame.run.board[api.CENTER][api.CENTER + 2] = { color: "magenta", seed: false, age: 0 };
        counterclockwiseGame.rotateStructure(-1);
        counterclockwiseGame.updateRotationAnimation(1);
        assert(
          counterclockwiseGame.run.board[api.CENTER - 2][api.CENTER]?.color === "magenta" &&
            counterclockwiseGame.run.orientationTurns === 3,
          "counterclockwise rotation moves a right-side cell above the center"
        );

        const coreGame = new api.BalanceStackGame({ random: () => 0 });
        fillCenteredSquare(coreGame, 1);
        coreGame.recalculateCoreSquare();
        assert(coreGame.run.coreLayers === 1, "recalculateCoreSquare detects a 3x3 centered square");

        const multiGrowthGame = new api.BalanceStackGame({ random: () => 0 });
        fillCenteredSquare(multiGrowthGame, 2);
        multiGrowthGame.recalculateCoreSquare();
        assert(multiGrowthGame.run.coreLayers === 2, "recalculateCoreSquare detects a 5x5 centered square");
        assert(
          multiGrowthGame.run.coreChargeCount === 2 && multiGrowthGame.run.coreGrowthCount === 2,
          "multiple centered-square layers award one charge per gained layer"
        );

        const harvestGame = new api.BalanceStackGame({ random: () => 0 });
        harvestGame.restart();
        harvestGame.session.bankedDuds = 3;
        harvestGame.session.bankedPulseCharges = 4;
        fillCenteredSquare(harvestGame, 1);
        harvestGame.run.board[api.CENTER][api.CENTER + 3] = { color: "magenta", seed: false, age: 0 };
        harvestGame.recalculateCoreSquare();
        harvestGame.startHarvestSequence();
        assert(harvestGame.presentation.harvestSequence.phase === "impact", "harvest begins with the impact phase");
        assert(harvestGame.presentation.harvestSequence.harvestedDuds === 8, "harvest counts influenced blocks as duds");
        assert(harvestGame.presentation.harvestSequence.outerBlocks.length === 1, "harvest keeps non-dud outer blocks separate");
        assert(harvestGame.presentation.harvestSequence.harvestedCharges === 1, "harvest captures run-earned Pulse charges");
        assert(
          harvestGame.session.bankedDuds === 3 && harvestGame.session.bankedPulseCharges === 4,
          "harvest starts with run-earned and banked resources still separate"
        );

        assert(completeHarvest(harvestGame), "harvest sequence reaches its return state and completes");
        assert(
          harvestGame.session.bankedDuds === 11 && harvestGame.session.bankedPulseCharges === 5,
          "completed harvest adds the exact run totals to session bank values"
        );
        assert(
          harvestGame.lifecycle.phase === api.GAME_PHASES.TITLE,
          "completed harvest returns the game to the title phase"
        );
        assert(harvestGame.run.coreChargeCount === 0, "completed harvest clears run-earned Pulse charges");

        const preservedSession = harvestGame.session;
        const completedRun = harvestGame.run;
        harvestGame.setPhase(api.GAME_PHASES.PAUSED);
        harvestGame.restart();
        assert(
          harvestGame.lifecycle.phase === api.GAME_PHASES.PLAYING && Boolean(harvestGame.run.current),
          "restart enters the playing phase with a falling piece"
        );
        assert(harvestGame.session === preservedSession, "restart preserves the session state object");
        assert(harvestGame.run !== completedRun, "restart replaces the run state object");
        assert(
          harvestGame.session.bankedDuds === 11 && harvestGame.session.bankedPulseCharges === 5,
          "restart preserves session bank values"
        );
        assert(harvestGame.run.coreChargeCount === 0, "restart begins with no run-earned Pulse charges");

        const lifecycleGame = new api.BalanceStackGame({ random: () => 0 });
        assert(lifecycleGame.lifecycle.phase === api.GAME_PHASES.TITLE, "lifecycle begins in the title phase");
        lifecycleGame.startGame();
        assert(lifecycleGame.lifecycle.phase === api.GAME_PHASES.LAUNCHING, "Start enters the launching phase");
        lifecycleGame.startGame();
        assert(lifecycleGame.lifecycle.phase === api.GAME_PHASES.LAUNCHING, "repeated Start does not restart the launch phase");
        lifecycleGame.finishStartSequence();
        assert(
          lifecycleGame.lifecycle.phase === api.GAME_PHASES.PLAYING && Boolean(lifecycleGame.run.current),
          "finishing the title transition enters the playing phase"
        );
        lifecycleGame.finishStartSequence();
        assert(lifecycleGame.lifecycle.phase === api.GAME_PHASES.PLAYING, "launch completion is ignored outside launching");
        lifecycleGame.togglePause();
        assert(lifecycleGame.lifecycle.phase === api.GAME_PHASES.PAUSED, "pause moves playing into the paused phase");
        lifecycleGame.togglePause();
        assert(lifecycleGame.lifecycle.phase === api.GAME_PHASES.PLAYING, "pause toggle resumes the playing phase");
        lifecycleGame.startHarvestSequence();
        assert(
          lifecycleGame.lifecycle.phase === api.GAME_PHASES.HARVESTING &&
            lifecycleGame.presentation.harvestSequence?.phase === "impact" &&
            lifecycleGame.run.current === null,
          "starting harvest enters the harvesting phase and suspends the active piece"
        );
        const activeHarvest = lifecycleGame.presentation.harvestSequence;
        lifecycleGame.startHarvestSequence();
        assert(lifecycleGame.presentation.harvestSequence === activeHarvest, "duplicate harvest start is ignored");
        lifecycleGame.finishHarvestSequence();
        assert(
          lifecycleGame.lifecycle.phase === api.GAME_PHASES.TITLE && lifecycleGame.presentation.harvestSequence === null,
          "finishing harvest restores the title phase"
        );
        let invalidPhaseRejected = false;
        try {
          lifecycleGame.setPhase("unknown");
        } catch (error) {
          invalidPhaseRejected = true;
        }
        assert(
          invalidPhaseRejected && lifecycleGame.lifecycle.phase === api.GAME_PHASES.TITLE,
          "unknown lifecycle phases are rejected without changing state"
        );
      } catch (error) {
        logResult(false, "unexpected exception", error && error.message ? error.message : String(error));
      }

      const summary = document.createElement("div");
      summary.className = "summary";
      summary.textContent = `Completed ${passes + failures} checks: ${passes} passed, ${failures} failed.`;
      resultsNode.appendChild(summary);
    </script>
  </body>
</html>
